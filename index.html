<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRescue | AI Техническа Поддръжка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
  
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-tools me-2"></i>TechRescue
            </a>
        </div>
    </nav>

    <div class="container hero-section">
        <h1 class="display-5">Вашият AI Техник</h1>
        <p class="lead">Мгновена експертна помощ за <span style="color:var(--accent-blue)">Windows</span> и <span style="color:var(--accent-orange)">Linux</span>.</p>
    </div>

    <div class="container chat-container">
        <div class="main-card">
            
            <div class="mb-4 text-center os-selector">
                <h5 class="text-muted mb-3">Изберете Вашата операционна система:</h5>
                <div class="d-inline-block me-2">
                    <input type="radio" class="btn-check" name="os-type" id="windows" checked>
                    <label class="btn btn-outline-primary" for="windows">
                        <i class="fab fa-windows me-2"></i>Windows
                    </label>
                </div>

                <div class="d-inline-block">
                    <input type="radio" class="btn-check" name="os-type" id="linux">
                    <label class="btn btn-outline-warning" for="linux">
                        <i class="fab fa-linux me-2"></i>Linux
                    </label>
                </div>
            </div>

            <div class="chat-box" id="chatWindow">
                <div class="message ai-message">
                    <i class="fas fa-robot message-icon"></i>
                    <div class="message-content">
                        Здравейте! Аз съм TechRescue. Опишете техническия си проблем или команда, която искате да разберете. <br>
                        <small class="text-muted">(Напр.: "Не мога да се свържа с Wi-Fi на Windows")</small>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="userInput" class="form-control" placeholder="Опишете проблема тук...">
                <button class="btn btn-primary" onclick="sendMessage()">
                    <i class="fas fa-paper-plane me-1"></i> Изпрати
                </button>
            </div>

        </div>
    </div>

    <script>
        function sendMessage() {
            let input = document.getElementById('userInput');
            let chatWindow = document.getElementById('chatWindow');
            
            if (input.value.trim() !== "") {
                // 1. Добавяне на твоя въпрос с икона на човек
                chatWindow.innerHTML += `
                    <div class="message user-message">
                        <i class="fas fa-user message-icon"></i>
                        <div class="message-content">${input.value}</div>
                    </div>
                `;
                
                // Изчистване и фокус на полето
                let userText = input.value;
                input.value = "";
                
                // Автоматично скролване най-долу
                chatWindow.scrollTop = chatWindow.scrollHeight;

                // 2. Симулация на отговор от AI след 1 секунда
                setTimeout(() => {
                    chatWindow.innerHTML += `
                        <div class="message ai-message">
                            <i class="fas fa-robot message-icon"></i>
                            <div class="message-content">
                                Анализирам проблема: "<em>${userText}</em>". <br>
                                <span style="color: #ffca28"><i class="fas fa-plug me-1"></i>За истински отговор, свържете ме с Backend сървър!</span>
                            </div>
                        </div>
                    `;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }, 1000);
            }
        }

        // Позволява натискането на Enter да изпраща съобщението
        document.getElementById("userInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
